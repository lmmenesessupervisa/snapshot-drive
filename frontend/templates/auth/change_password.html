{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block header %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="max-w-md p-6 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
  <form id="cp-form" class="space-y-3">
    <div>
      <label class="block text-sm mb-1">Contraseña actual</label>
      <input name="current" type="password" required autocomplete="current-password"
             class="w-full rounded border border-[var(--border)] bg-[var(--bg)] px-3 py-2 text-sm">
    </div>
    <div>
      <label class="block text-sm mb-1">Nueva contraseña</label>
      <input name="new" type="password" required autocomplete="new-password"
             placeholder="mínimo 12 caracteres, fuerte"
             class="w-full rounded border border-[var(--border)] bg-[var(--bg)] px-3 py-2 text-sm">
    </div>
    <button type="submit"
            class="rounded bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 text-sm font-medium">
      Guardar
    </button>
    <p id="cp-msg" class="hidden text-sm"></p>
  </form>
</div>
<script>
document.getElementById("cp-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const r = await apiFetch("/auth/password", {
    method: "POST",
    body: JSON.stringify(data),
  });
  const j = await r.json();
  const p = document.getElementById("cp-msg");
  p.textContent = r.ok ? "Contraseña actualizada." : (j.error || "Error");
  p.className = "text-sm " + (r.ok ? "text-emerald-400" : "text-rose-400");
  p.classList.remove("hidden");
  if (r.ok) e.target.reset();
});
</script>
{% endblock %}
