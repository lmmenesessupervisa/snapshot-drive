{% extends "base.html" %}
{% block title %}Cambiar contraseña{% endblock %}
{% block header %}Cambiar contraseña{% endblock %}
{% block content %}
<div class="max-w-md">
  <div class="card">
    <div class="px-5 py-4 border-b border-[var(--border)]">
      <h2 class="font-semibold">Actualizar contraseña</h2>
      <p class="text-xs text-[var(--muted)] mt-1">
        Mínimo 12 caracteres, fuerte. Después de cambiarla se cierran las sesiones activas en otros equipos.
      </p>
    </div>
    <form id="cp-form" class="p-5 space-y-4">
      <div>
        <label class="block text-sm mb-1">Contraseña actual</label>
        <input name="current" type="password" required autocomplete="current-password" class="input">
      </div>
      <div>
        <label class="block text-sm mb-1">Nueva contraseña</label>
        <input name="new" type="password" required autocomplete="new-password"
               placeholder="mínimo 12 caracteres" class="input">
      </div>
      <div class="pt-2 flex items-center gap-3">
        <button type="submit" class="btn-primary">Guardar</button>
        <a href="/" class="btn-secondary">Cancelar</a>
      </div>
      <p id="cp-msg" class="hidden text-sm"></p>
    </form>
  </div>
</div>
<script>
document.getElementById("cp-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  const r = await apiFetch("/auth/password", {
    method: "POST",
    body: JSON.stringify(data),
  });
  const j = await r.json();
  const p = document.getElementById("cp-msg");
  p.textContent = r.ok ? "Contraseña actualizada." : (j.error || "Error");
  p.className = "text-sm " + (r.ok ? "text-emerald-600" : "text-rose-500");
  p.classList.remove("hidden");
  if (r.ok) e.target.reset();
});
</script>
{% endblock %}
