<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>snapshot-V3 · Restablecer contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'], mono: ['JetBrains Mono','ui-monospace'] },
          colors: { brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' } },
        }
      }
    };
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="h-full font-sans antialiased flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="brand-logo">S</div>
      <div>
        <div class="font-semibold tracking-tight text-lg">snapshot-V3</div>
        <div class="text-[11px] uppercase tracking-wider text-[var(--muted)]">backup manager</div>
      </div>
    </div>
    <h1 class="text-xl font-semibold mb-1">Restablecer contraseña</h1>
    <p class="text-sm text-[var(--muted)] mb-5">Ingresá tu email para recibir un enlace de restablecimiento.</p>
    <form id="rr-form" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Email</label>
        <input name="email" type="email" required autofocus autocomplete="email" class="input">
      </div>
      <button type="submit" class="btn-primary w-full justify-center">Enviar enlace</button>
      <p id="rr-msg" class="hidden text-sm text-emerald-600"></p>
      <div class="text-xs text-[var(--muted)] text-center pt-2">
        <a href="/auth/login" class="text-brand-500 hover:underline">Volver al login</a>
      </div>
    </form>
    <p class="mt-5 pt-4 border-t border-[var(--border)] text-xs text-[var(--muted)]">
      Si el email no llega, pedile a un admin que ejecute
      <code class="mono">snapctl admin reset-password</code> en el host.
    </p>
  </div>
<script>
document.getElementById("rr-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  await fetch("/auth/reset-request", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  });
  const p = document.getElementById("rr-msg");
  p.textContent = "Si el email existe, recibirás un enlace en breve.";
  p.classList.remove("hidden");
});
</script>
</body>
</html>
