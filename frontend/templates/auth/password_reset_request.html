<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>snapshot-V3 · Restablecer contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="h-full font-sans antialiased flex items-center justify-center p-6">
  <div class="w-full max-w-md p-8 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
    <h1 class="text-xl font-semibold mb-4">Restablecer contraseña</h1>
    <form id="rr-form" class="space-y-3">
      <input name="email" type="email" required autofocus
             placeholder="tu email"
             class="w-full rounded border border-[var(--border)] bg-[var(--bg)] px-3 py-2 text-sm">
      <button type="submit"
              class="w-full rounded bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 text-sm font-medium">
        Enviar enlace
      </button>
    </form>
    <p id="rr-msg" class="mt-3 hidden text-sm text-[var(--muted)]"></p>
    <p class="mt-4 text-xs text-[var(--muted)]">
      Si no llega el email, pedile a un admin que ejecute
      <code class="font-mono">snapctl admin reset-password</code> en el host.
    </p>
  </div>
<script>
document.getElementById("rr-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  await fetch("/auth/reset-request", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  });
  const p = document.getElementById("rr-msg");
  p.textContent = "Si el email existe, recibirás un enlace en breve.";
  p.classList.remove("hidden");
});
</script>
</body>
</html>
