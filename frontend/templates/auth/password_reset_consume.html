<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>snapshot-V3 · Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="h-full font-sans antialiased flex items-center justify-center p-6">
  <div class="w-full max-w-md p-8 rounded-lg border border-[var(--border)] bg-[var(--surface)]">
    <h1 class="text-xl font-semibold mb-4">Nueva contraseña</h1>
    <form id="rc-form" class="space-y-3">
      <input name="new_password" type="password" required autofocus
             placeholder="mínimo 12 caracteres, fuerte"
             class="w-full rounded border border-[var(--border)] bg-[var(--bg)] px-3 py-2 text-sm">
      <button type="submit"
              class="w-full rounded bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 text-sm font-medium">
        Confirmar
      </button>
      <p id="rc-msg" class="hidden text-sm"></p>
    </form>
  </div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById("rc-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  data.token = params.get("token");
  const r = await fetch("/auth/reset-consume", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  });
  const j = await r.json();
  const p = document.getElementById("rc-msg");
  if (r.ok) {
    p.textContent = "Listo. Iniciá sesión con tu nueva contraseña.";
    p.className = "text-sm text-emerald-400";
    p.classList.remove("hidden");
    setTimeout(() => location = "/auth/login", 1500);
  } else {
    p.textContent = j.error || "No se pudo restablecer.";
    p.className = "text-sm text-rose-400";
    p.classList.remove("hidden");
  }
});
</script>
</body>
</html>
