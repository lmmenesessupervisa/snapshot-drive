<!doctype html>
<html lang="es" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>snapshot-V3 · Nueva contraseña</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui'], mono: ['JetBrains Mono','ui-monospace'] },
          colors: { brand: { 400: '#38bdf8', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' } },
        }
      }
    };
  </script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="h-full font-sans antialiased flex items-center justify-center p-4">
  <div class="card w-full max-w-md p-8">
    <div class="flex items-center gap-3 mb-6">
      <div class="brand-logo">S</div>
      <div>
        <div class="font-semibold tracking-tight text-lg">snapshot-V3</div>
        <div class="text-[11px] uppercase tracking-wider text-[var(--muted)]">backup manager</div>
      </div>
    </div>
    <h1 class="text-xl font-semibold mb-1">Nueva contraseña</h1>
    <p class="text-sm text-[var(--muted)] mb-5">Mínimo 12 caracteres, fuerte. Se cerrarán otras sesiones activas.</p>
    <form id="rc-form" class="space-y-4">
      <div>
        <label class="block text-sm mb-1">Nueva contraseña</label>
        <input name="new_password" type="password" required autofocus autocomplete="new-password"
               placeholder="mín. 12 caracteres" class="input">
      </div>
      <button type="submit" class="btn-primary w-full justify-center">Confirmar</button>
      <p id="rc-msg" class="hidden text-sm"></p>
    </form>
  </div>
<script>
const params = new URLSearchParams(location.search);
document.getElementById("rc-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target));
  data.token = params.get("token");
  const r = await fetch("/auth/reset-consume", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data),
  });
  const j = await r.json();
  const p = document.getElementById("rc-msg");
  if (r.ok) {
    p.textContent = "Listo. Iniciá sesión con tu nueva contraseña.";
    p.className = "text-sm text-emerald-600";
    p.classList.remove("hidden");
    setTimeout(() => location = "/auth/login", 1500);
  } else {
    p.textContent = j.error || "No se pudo restablecer.";
    p.className = "text-sm text-rose-500";
    p.classList.remove("hidden");
  }
});
</script>
</body>
</html>
