# ===========================================================
# snapshot-V3 — configuración principal del motor de backups
# ===========================================================

# Identificación
HOSTNAME="$(hostname -s)"

# Repositorio local de Restic
RESTIC_REPO="/var/lib/snapshot-v3/repo"
RESTIC_PASSWORD_FILE="/var/lib/snapshot-v3/.restic-pass"

# Rutas a respaldar (una por línea en el script; aquí se separan por espacios)
BACKUP_PATHS="/etc /home /var/www /root"

# Archivo con patrones de exclusión
EXCLUDES_FILE="/opt/snapshot-V3/core/etc/excludes.list"

# Rclone → Google Drive
RCLONE_REMOTE="gdrive"
RCLONE_REMOTE_PATH="snapshots/${HOSTNAME}"
RCLONE_CONFIG="/var/lib/snapshot-v3/rclone.conf"

# --- Tuning rclone para Google Drive ------------------------------------
# Los defaults de rclone (4 transfers concurrentes, pacer agresivo) disparan
# 403 userRateLimitExceeded en Drive. Google entra en backoff exponencial
# y el upload queda "colgado" horas, lo que desde fuera parece una
# desconexión de la cuenta. Estos valores son los recomendados por la doc
# de rclone para Google Drive con subidas grandes.
RCLONE_DRIVE_CHUNK_SIZE="64M"      # trozo por request (menos trozos = menos API calls)
RCLONE_TRANSFERS="2"               # archivos en paralelo (Drive tolera mal >4)
RCLONE_CHECKERS="4"                # chequeos concurrentes
RCLONE_TPSLIMIT="5"                # tps máx globales (Drive: ~10 req/s/user)
RCLONE_TPSLIMIT_BURST="10"
RCLONE_PACER_MIN_SLEEP="100ms"     # separación mínima entre requests
RCLONE_CONTIMEOUT="30s"
RCLONE_TIMEOUT="300s"
RCLONE_LOW_LEVEL_RETRIES="10"
RCLONE_RETRIES="5"
# Límite de subida (vacío = sin límite). Ejemplo: "8M" para 8 MB/s.
RCLONE_BWLIMIT=""

# Antes de cada create/reconcile, snapctl ejecuta `restic unlock` que
# limpia locks stale automáticamente (restic considera stale cualquier
# lock con más de 30 minutos, no configurable por flag). Esto evita el
# caso "el snapshot anterior murió y dejó el repo bloqueado" sin que
# tengas que pulsar manualmente "Forzar desbloqueo".

# OAuth 2.0 de Google (Device Flow). Credenciales del OAuth Client ID
# creado en Google Cloud Console tipo "TVs and Limited Input devices".
# Permite que el cliente vincule su cuenta de Drive desde el panel web
# sin necesidad de instalar rclone localmente.
# TODO: rellenar con las credenciales de tu propio OAuth Client (Device Flow).
# Para despliegue real, copia este archivo a /etc/snapshot-v3/snapshot.conf
# o usa un EnvironmentFile en systemd — NO commitees valores reales.
GOOGLE_CLIENT_ID=""
GOOGLE_CLIENT_SECRET=""
# Device Flow solo permite scopes limitados — drive.file basta para backups
# (rclone solo verá los archivos que el propio snapshot-V3 ha creado).
GOOGLE_OAUTH_SCOPE="https://www.googleapis.com/auth/drive.file"
# Scope escrito en rclone.conf (formato corto de rclone)
RCLONE_SCOPE="drive.file"

# Políticas de retención (restic forget)
KEEP_DAILY=7
KEEP_WEEKLY=4
KEEP_MONTHLY=6
KEEP_YEARLY=2

# Logging
LOG_DIR="/var/log/snapshot-v3"
LOG_FILE="${LOG_DIR}/snapctl.log"

# Base de datos del backend (solo lectura desde CLI para healthchecks)
DB_PATH="/var/lib/snapshot-v3/snapshot.db"

# Notificaciones (opcional)
NOTIFY_EMAIL=""
NOTIFY_WEBHOOK=""

# Red (backend API)
API_HOST="127.0.0.1"
API_PORT="5070"
FRONTEND_PORT="5071"
